spring:
  application:
    name: support-service
  profiles:
    active: test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false

jwt:
  secret: test-secret-de-256-bits-para-jwt-firma-hmac-sha256-test-only
  expiration-ms: 3600000

logging:
  level:
    root: WARN
    cl.velourbe: DEBUG
