spring:
  application:
    name: scooter-rental-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/db_scooter_rentals}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  autoconfigure:
    exclude:
      - org.springdoc.core.configuration.SpringDocHateoasConfiguration

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:cambiame-por-un-secret-de-256-bits-minimo-aqui}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
