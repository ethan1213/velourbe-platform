# Arquitectura: Cliente -> API Gateway (8080) -> BFF (8083) -> 10 microservicios.
# El Gateway va primero y solo enruta hacia el BFF; el BFF apunta a todos los
# microservicios. El orden de arranque real lo controlan los depends_on.
services:

  api-gateway:
    build: ./api-gateway
    container_name: velourbe-gateway
    ports:
      - "8080:8080"
    depends_on:
      bff-service:
        condition: service_healthy
    environment:
      BFF_SERVICE_URL: http://bff-service:8083

  bff-service:
    build: ./bff-service
    container_name: velourbe-bff
    ports:
      - "8083:8083"
    depends_on:
      user-auth-service:
        condition: service_healthy
      scooter-rental-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      logistics-service:
        condition: service_healthy
      maintenance-service:
        condition: service_healthy
      support-service:
        condition: service_healthy
      station-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-velourbe-secret-de-256-bits-para-jwt-firma-hmac-sha256}
      USER_AUTH_URL: http://user-auth-service:8081
      RENTAL_URL: http://scooter-rental-service:8082
      PAYMENT_URL: http://payment-service:8084
      NOTIFICATION_URL: http://notification-service:8085
      ANALYTICS_URL: http://analytics-service:8086
      LOGISTICS_URL: http://logistics-service:8087
      MAINTENANCE_URL: http://maintenance-service:8088
      SUPPORT_URL: http://support-service:8089
      STATION_URL: http://station-service:8090
      REVIEW_URL: http://review-service:8091
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-auth-service:
    build: ./user-auth-service
    container_name: velourbe-user-auth
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/db_scooter_users
      DB_USERNAME: velourbe
      DB_PASSWORD: velourbe123
      JWT_SECRET: ${JWT_SECRET:-velourbe-secret-de-256-bits-para-jwt-firma-hmac-sha256}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
