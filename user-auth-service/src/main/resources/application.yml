spring:
  application:
    name: user-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/db_scooter_users
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

jwt:
  secret: cambiame-por-un-secret-de-256-bits-minimo-aqui
  expiration-ms: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
