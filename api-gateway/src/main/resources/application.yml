spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      # El Gateway es el único punto de entrada y no lleva lógica:
      # enruta TODO el tráfico /api/** hacia el BFF, que es quien
      # se comunica con los microservicios.
      routes:
        - id: bff-service
          uri: ${BFF_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/**

        # ── Rutas de documentación (Swagger centralizado) ──
        # Exponen el /v3/api-docs de cada servicio bajo /docs/* para
        # que el Swagger UI del Gateway (puerto 8080) los agrupe.
        - id: docs-user-auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/docs/user-auth
          filters:
            - SetPath=/v3/api-docs

        - id: docs-rental
          uri: ${RENTAL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/docs/rental
          filters:
            - SetPath=/v3/api-docs

        - id: docs-bff
          uri: ${BFF_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/docs/bff
          filters:
            - SetPath=/v3/api-docs

        - id: docs-payment
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/docs/payment
          filters:
            - SetPath=/v3/api-docs

        - id: docs-notification
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/docs/notification
          filters:
            - SetPath=/v3/api-docs

        - id: docs-analytics
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/docs/analytics
          filters:
            - SetPath=/v3/api-docs

        - id: docs-logistics
          uri: ${LOGISTICS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/docs/logistics
          filters:
            - SetPath=/v3/api-docs

        - id: docs-maintenance
          uri: ${MAINTENANCE_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/docs/maintenance
          filters:
            - SetPath=/v3/api-docs

        - id: docs-support
          uri: ${SUPPORT_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/docs/support
          filters:
            - SetPath=/v3/api-docs

        - id: docs-station
          uri: ${STATION_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/docs/station
          filters:
            - SetPath=/v3/api-docs

        - id: docs-review
          uri: ${REVIEW_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/docs/review
          filters:
            - SetPath=/v3/api-docs

server:
  port: 8080

# Swagger UI centralizado: http://localhost:8080/swagger-ui.html
# El selector superior permite navegar la documentación de todos los servicios.
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-auth-service
        url: /docs/user-auth
      - name: scooter-rental-service
        url: /docs/rental
      - name: bff-service
        url: /docs/bff
      - name: payment-service
        url: /docs/payment
      - name: notification-service
        url: /docs/notification
      - name: analytics-service
        url: /docs/analytics
      - name: logistics-service
        url: /docs/logistics
      - name: maintenance-service
        url: /docs/maintenance
      - name: support-service
        url: /docs/support
      - name: station-service
        url: /docs/station
      - name: review-service
        url: /docs/review

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
