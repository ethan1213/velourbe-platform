spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      # El Gateway es el único punto de entrada y no lleva lógica:
      # enruta TODO el tráfico /api/** hacia el BFF, que es quien
      # se comunica con los microservicios.
      routes:
        - id: bff-service
          uri: ${BFF_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
