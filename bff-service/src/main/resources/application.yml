spring:
  application:
    name: bff-service

server:
  port: 8083

jwt:
  secret: ${JWT_SECRET:velourbe-secret-de-256-bits-para-jwt-firma-hmac-sha256}

services:
  user-auth:
    url: ${USER_AUTH_URL:http://localhost:8081}
  rental:
    url: ${RENTAL_URL:http://localhost:8082}
  support:
    url: ${SUPPORT_URL:http://localhost:8089}
  maintenance:
    url: ${MAINTENANCE_URL:http://localhost:8088}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
